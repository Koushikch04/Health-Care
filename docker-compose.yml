services:
  mongo:
    image: mongo:7
    container_name: healthcare-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: healthcare-server
    restart: unless-stopped
    environment:
      PORT: 8000
      MONGO_URL: mongodb://mongo:27017/HealthCare
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      JWT_SECRET: change-me-in-production
      SESSION_SECRET: change-me-in-production
      OTP_LENGTH: 6
      MAIL_HOST: smtp.gmail.com
      MAIL_USER: ""
      MAIL_PASS: ""
      PRIAID_API_TOKEN: ""
      PRIAD_API_KEY: ""
      PRIAD_API_SECRET: ""
      SUPER_ADMIN_PASSWORD: change-me
      ADMIN_PASSWORD: change-me
      GEMINI_API_KEY: ""
      HF_API_KEY: ""
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - server_uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_BACKEND: http://localhost:8000
    container_name: healthcare-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo_data:
  server_uploads:
